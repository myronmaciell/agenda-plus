<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Plus+ - Calendário</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#1a1a2e;
  color:#e2e2f0;
  font-family:'Segoe UI',Tahoma,sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

.container{
  width:100%;
  max-width:900px;
}

.logo{
  text-align:center;
  margin-bottom:30px;
}

.logo h1{
  color:#c084fc;
  font-size:2rem;
}

.logo p{
  color:#9ca3af;
}

.card{
  background:#16213e;
  border:1px solid #2d2d50;
  border-radius:14px;
  padding:24px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.btn{
  background:#3b82f6;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
  text-decoration:none;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}

.day-name{
  text-align:center;
  font-weight:bold;
  color:#c084fc;
  font-size:14px;
}

.day{
  background:#0f0f23;
  border:1px solid #2d2d50;
  border-radius:10px;
  min-height:90px;
  padding:8px;
  cursor:pointer;
  transition:0.2s;
}

.day:hover{
  border-color:#c084fc;
  transform:scale(1.02);
}

.day-number{
  font-weight:bold;
  margin-bottom:4px;
}

.evento{
  font-size:11px;
  margin-top:3px;
  color:#c084fc;
  background:#1f1f3a;
  padding:2px 6px;
  border-radius:6px;
}

/* ===== POPUP ===== */

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#16213e;
  padding:20px;
  border-radius:12px;
  width:320px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.modal-content h3{
  color:#c084fc;
}

select, input{
  padding:10px;
  border-radius:8px;
  border:none;
  background:#0f0f23;
  color:white;
}

.modal-buttons{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.save{
  background:#22c55e;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-weight:700;
}

.cancel{
  background:#ef4444;
  border:none;
  padding:8px;
  border-radius:8px;
  cursor:pointer;
  color:white;
  font-weight:700;
}

#listaEventosDia{
  max-height:120px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>📅 Agenda Plus+</h1>
    <p>Calendário mensal</p>
  </div>

  <div class="card">

    <div class="header">
      <h2 id="mesAno"></h2>
      <a href="index.html" class="btn">Voltar</a>
    </div>

    <div class="calendar" id="calendar"></div>

  </div>
</div>

<!-- POPUP -->
<div class="modal" id="modal">
  <div class="modal-content">

    <h3>Novo evento</h3>

    <select id="pessoaSelect"></select>
    <input type="text" id="descricaoInput" placeholder="Descrição">

    <h4 style="color:#c084fc;font-size:13px;">Eventos do dia</h4>
    <div id="listaEventosDia"></div>

    <div class="modal-buttons">
      <button class="save" onclick="salvarEvento()">Salvar</button>
      <button class="cancel" onclick="fecharModal()">Cancelar</button>
    </div>

  </div>
</div>

<script>
const calendar = document.getElementById("calendar");
const mesAno = document.getElementById("mesAno");

const modal = document.getElementById("modal");
const pessoaSelect = document.getElementById("pessoaSelect");
const descricaoInput = document.getElementById("descricaoInput");
const listaEventosDia = document.getElementById("listaEventosDia");

let dataSelecionada = null;

let hoje = new Date();
let mesAtual = hoje.getMonth();
let anoAtual = hoje.getFullYear();

const STORAGE_PESSOAS = "comunidade_pessoas";
const STORAGE_EVENTOS = "agenda_eventos";

function getPessoas(){
  return JSON.parse(localStorage.getItem(STORAGE_PESSOAS) || "[]");
}

function getEventos(){
  return JSON.parse(localStorage.getItem(STORAGE_EVENTOS) || "[]");
}

function saveEventos(lista){
  localStorage.setItem(STORAGE_EVENTOS, JSON.stringify(lista));
}

function abrirModal(data){
  dataSelecionada = data;

  const pessoas = getPessoas();
  const eventos = getEventos();

  pessoaSelect.innerHTML = "";

  pessoas.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.textContent = p.nome;
    pessoaSelect.appendChild(opt);
  });

  descricaoInput.value = "";

  // eventos do dia
  listaEventosDia.innerHTML = "";

  const doDia = eventos.filter(e => e.data === data);

  if(doDia.length === 0){
    listaEventosDia.innerHTML = "<p style='color:#666'>Nenhum evento</p>";
  } else {
    doDia.forEach(ev=>{
      const div = document.createElement("div");
      div.style.padding = "6px";
      div.style.marginTop = "4px";
      div.style.background = "#0f0f23";
      div.style.borderRadius = "6px";

      div.innerHTML = `
        👤 <b>${ev.pessoaNome}</b><br>
        📝 ${ev.descricao || "Sem descrição"}
      `;

      listaEventosDia.appendChild(div);
    });
  }

  modal.style.display = "flex";
}

function fecharModal(){
  modal.style.display = "none";
}

function salvarEvento(){

  if(!descricaoInput.value.trim()){
    alert("Digite uma descrição");
    return;
  }

  const pessoas = getPessoas();
  const eventos = getEventos();

  const pessoa = pessoas.find(p => p.id == pessoaSelect.value);

  if(!pessoa) return;

  eventos.push({
    data: dataSelecionada,
    pessoaId: pessoa.id,
    pessoaNome: pessoa.nome,
    descricao: descricaoInput.value
  });

  saveEventos(eventos);

  fecharModal();
  gerarCalendario(mesAtual, anoAtual);
}

function gerarCalendario(mes, ano){

  calendar.innerHTML = "";

  const meses = [
    "Janeiro","Fevereiro","Março","Abril",
    "Maio","Junho","Julho","Agosto",
    "Setembro","Outubro","Novembro","Dezembro"
  ];

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  mesAno.textContent = `${meses[mes]} ${ano}`;

  diasSemana.forEach(d=>{
    const el = document.createElement("div");
    el.className = "day-name";
    el.textContent = d;
    calendar.appendChild(el);
  });

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const totalDias = new Date(ano, mes+1, 0).getDate();

  for(let i=0;i<primeiroDia;i++){
    calendar.appendChild(document.createElement("div"));
  }

  const eventos = getEventos();

  for(let dia=1; dia<=totalDias; dia++){

    const dataISO =
    `${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;

    const box = document.createElement("div");
    box.className = "day";

    box.innerHTML = `<div class="day-number">${dia}</div>`;

    eventos
      .filter(e => e.data === dataISO)
      .forEach(ev=>{
        const div = document.createElement("div");
        div.className = "evento";
        div.textContent = `👤 ${ev.pessoaNome} - ${ev.descricao}`;
        box.appendChild(div);
      });

    box.addEventListener("click", ()=>{
      abrirModal(dataISO);
    });

    calendar.appendChild(box);
  }
}

gerarCalendario(mesAtual, anoAtual);

</script>

</body>
</html>
